########################################################################
##                                                                    ##
##                  CIM Server configuration file                     ##
##                                                                    ##
########################################################################

########################################################################
#                                                                      #
# This is the configuration file for the CIMOM. The configuration      #
# properties in this file are loaded in to CIMOM at startup.           #
# CIMOM updates this file with the changes in the configurations.      #
#                                                                      #
# It is recommended that user do not edit this file, instead use       #
# CIMConfigCommand to make any changes to the CIMOM configurations.    #
#                                                                      #
########################################################################

httpPort=5988
httpsPort=5989
enableHttpConnection=false
enableHttpsConnection=true
enableAuthentication=true
forceProviderProcesses=false
sslCertificateFilePath=/compass/cimom/certificate/server.crt
sslKeyFilePath=/compass/cimom/certificate/server.key
logdir=/data/cimom
startupClass=root/ibm:IBMTSSVC_Startup
shutdownTimeout=10
passwordFilePath=/data/cimom/password/cimserver.passwd
sslCipherSuite=ALL:!SSLv2:!aNULL:!eNULL:!MD5:!RC4:!LOW:!EXPORT:@STRENGTH
oldestSSLProtocol=TLS1.1
